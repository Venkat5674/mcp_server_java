server.port=${PORT:8080}
spring.ai.mcp.server.name=leetcode-github-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.transport=WEBFLUX
spring.ai.mcp.server.sse.message-endpoint=/mcp/message
github.token=${GITHUB_TOKEN}
github.api.base-url=https://api.github.com
logging.file.name=logs/mcp-server.log
logging.level.root=WARN
logging.level.com.venkatesh=INFO

# Enable web server for Render health checks (since STDIO transport alone doesn't bind a port)
spring.main.web-application-type=reactive
